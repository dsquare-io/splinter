volumes:
  postgresql:
  node_modules:
  minio_data:

services:
  database:
    container_name: splinter-database
    hostname: splinter-database.local
    image: postgres:18
    environment:
      - "POSTGRES_USER=splinter"
      - "POSTGRES_PASSWORD=splinter"
      - "POSTGRES_DB=splinter"
    volumes:
      - postgresql:/var/lib/postgresql/
    ports:
      - "54321:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U splinter -d splinter" ]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    container_name: splinter-cache
    hostname: splinter-cache.local
    image: redis

  primary:
    container_name: splinter-primary
    hostname: splinter.local
    image: splinter
    depends_on:
      database:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DJANGO_DEBUG=True
      - PUBLIC_DOMAIN=localhost:5173
      - CELERY_TASK_ALWAYS_EAGER=True
      - REDIS_HOST=splinter-cache.local
      - AWS_S3_ENDPOINT_URL=http://splinter-minio.local:9000
      - AWS_S3_PRESIGNED_ENDPOINT_URL=http://localhost:9000
      - AWS_S3_REGION_NAME=us-east-1
      - AWS_STORAGE_BUCKET_NAME=splinter-media
      - AWS_ACCESS_KEY_ID=splinter
      - AWS_SECRET_ACCESS_KEY=splinter123
      - POSTGRES_HOSTNAME=splinter-database.local
      - POSTGRES_USERNAME=splinter
      - POSTGRES_PASSWORD=splinter
    command: >
      sh -c "
        splinter migrate &&
        splinter runserver 0.0.0.0:8000
      "
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./emails/:/tmp/splinter-emails/

  minio:
    container_name: splinter-minio
    hostname: splinter-minio.local
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=splinter
      - MINIO_ROOT_PASSWORD=splinter123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    container_name: splinter-minio-init
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://splinter-minio.local:9000 splinter splinter123 &&
        mc mb --ignore-existing local/splinter-media &&
        mc anonymous set download local/splinter-media &&
        printf '{\"CORSRules\":[{\"AllowedHeaders\":[\"*\"],\"AllowedMethods\":[\"GET\",\"PUT\",\"POST\",\"DELETE\",\"HEAD\"],\"AllowedOrigins\":[\"*\"],\"ExposeHeaders\":[\"ETag\"]}]}' > /tmp/cors.json &&
        mc cors set local/splinter-media /tmp/cors.json
      "

  ui:
    container_name: splinter-ui
    hostname: splinter-ui
    image: node:24-alpine
    command: >
      sh -c "
        cd /app &&
        echo 'Installing Dependencies...' &&
        npm install &&
        echo 'Starting Development Server...' &&
        npm run dev
      "
    environment:
      - "NODE_ENV=development"
      - "OAPI_SCHEMA_URL:http://splinter.local:8000/api/schema"
      - "VITE_APP_BACKEND_URL=http://splinter.local:8000"
    volumes:
      - ./ui:/app
      - node_modules:/app/node_modules/
    ports:
      - "5173:5173"
